<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Practice Battle</title>

<style>

body{
background:#07131d;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

.card{
max-width:800px;
margin:auto;
background:#122231;
padding:25px;
border-radius:20px;
}

h2{
color:#00ff99;
}

button{
display:block;
width:100%;
margin-top:12px;
padding:15px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#00ff99;
color:black;
}

</style>

</head>

<body>

<div class="card">

<h3 id="questionNumber"></h3>
  <h4 id="subject"></h4>

<h2 id="question">Loading...</h2>

<button id="A" onclick="checkAnswer(0)"></button>

<button id="B" onclick="checkAnswer(1)"></button>

<button id="C" onclick="checkAnswer(2)"></button>

<button id="D" onclick="checkAnswer(3)"></button>

<br>

<h3 id="score">
Score : 0
</h3>
<div id="result" style="margin-top:20px;font-size:20px;"></div>

<button id="nextBtn"
onclick="nextQuestion()"
style="display:none;">

Next Question ➜

</button>
</div>

<script src="questions.js"></script>

<script>

let current=0;
  QUESTIONS.sort(() => Math.random() - 0.5);

let score=0;
  
function loadQuestion(){

document.getElementById("subject").innerHTML =
"📚 " + QUESTIONS[current].subject;

document.getElementById("questionNumber").innerHTML =
"Question " + (current + 1) + " / " + QUESTIONS.length;

document.getElementById("question").innerText =
QUESTIONS[current].question;

document.getElementById("A").innerText =
QUESTIONS[current].options[0];

document.getElementById("B").innerText =
QUESTIONS[current].options[1];

document.getElementById("C").innerText =
QUESTIONS[current].options[2];

document.getElementById("D").innerText =
QUESTIONS[current].options[3];

}
  function checkAnswer(choice){

if(choice===QUESTIONS[current].correct){
    score++;
    document.getElementById(choice).style.background="green";
}else{
    document.getElementById(choice).style.background="red";
    document.getElementById(QUESTIONS[current].correct).style.background="green";
}

document.getElementById("score").innerHTML =
"Score : " + score;

document.getElementById("nextBtn").style.display="block";

let buttons=document.querySelectorAll(".option");

buttons.forEach(btn=>{
    btn.style.pointerEvents="none";
});

  }
  

function nextQuestion(){

current++;

if(current >= QUESTIONS.length){

document.querySelector(".card").innerHTML = `
<h1>🏆 Battle Finished!</h1>
<h2>Your Score: ${score} / ${QUESTIONS.length}</h2>
<button onclick="location.reload()">🔄 Play Again</button>
`;

return;

}

let buttons = document.querySelectorAll(".option");

buttons.forEach(btn=>{
btn.style.background="";
btn.style.pointerEvents="auto";
});

document.getElementById("nextBtn").style.display="none";

loadQuestion();

}

loadQuestion();
</script>

</body>
</html>
