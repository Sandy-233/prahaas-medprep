<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Practice Battle</title>

<style>

body{
background:#07131d;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

.card{
max-width:800px;
margin:auto;
background:#122231;
padding:25px;
border-radius:20px;
}

h2{
color:#00ff99;
}

button{
display:block;
width:100%;
margin-top:12px;
padding:15px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#00ff99;
color:black;
}

</style>

</head>

<body>

<div class="card">

<h3 id="questionNumber"></h3>
  <h4 id="subject"></h4>

<h2 id="question">Loading...</h2>
<button id="A" class="option" onclick="checkAnswer(0)"></button>

<button id="B" class="option" onclick="checkAnswer(1)"></button>

<button id="C" class="option" onclick="checkAnswer(2)"></button>

 <button id="D" class="option" onclick="checkAnswer(3)"></button>

<br>

<h3 id="score">
Score : 0
</h3>
<div id="result" style="margin-top:20px;font-size:20px;"></div>

<button id="nextBtn"
onclick="nextQuestion()"
style="display:none;">

Next Question ➜

</button>
</div>

<script src="questions.js"></script>
<script>

let current = 0;
let score = 0;
let xp = parseInt(localStorage.getItem("xp")) || 0;

const selectedSubject =
localStorage.getItem("battleSubject") || "Mixed";

let filteredQuestions = [...QUESTIONS];

if(selectedSubject !== "Mixed"){
filteredQuestions =
QUESTIONS.filter(q=>q.subject===selectedSubject);
}

filteredQuestions.sort(()=>Math.random()-0.5);

if(filteredQuestions.length===0){
document.getElementById("question").innerHTML =
"No questions available for " + selectedSubject;
throw new Error("No Questions");
}

function loadQuestion(){

let q = filteredQuestions[current];

document.getElementById("subject").innerHTML =
"📚 " + (q.subject || selectedSubject);

document.getElementById("questionNumber").innerHTML =
"Question " + (current+1) + " / " + filteredQuestions.length;

document.getElementById("question").innerHTML =
q.question;

document.getElementById("A").innerHTML =
q.options[0];

document.getElementById("B").innerHTML =
q.options[1];

document.getElementById("C").innerHTML =
q.options[2];

document.getElementById("D").innerHTML =
q.options[3];

document.querySelectorAll(".option").forEach(btn=>{
btn.style.background="";
btn.style.pointerEvents="auto";
});

document.getElementById("nextBtn").style.display="none";

}

function checkAnswer(choice){

const ids=["A","B","C","D"];

document.querySelectorAll(".option").forEach(btn=>{
btn.style.pointerEvents="none";
});

if(choice===filteredQuestions[current].correct){

score++;
xp+=10;
localStorage.setItem("xp",xp);

document.getElementById(ids[choice]).style.background="green";

}else{

document.getElementById(ids[choice]).style.background="red";

document.getElementById(
ids[filteredQuestions[current].correct]
).style.background="green";

}

document.getElementById("score").innerHTML =
"Score : "+score;

document.getElementById("nextBtn").style.display="block";

}

function nextQuestion(){

current++;

if(current>=filteredQuestions.length){

let coins=
parseInt(localStorage.getItem("coins"))||0;

coins+=score*10;

localStorage.setItem("coins",coins);

document.querySelector(".card").innerHTML=`

<h1>🏆 Battle Finished!</h1>

<h2>Your Score : ${score}/${filteredQuestions.length}</h2>

<h3>⭐ XP : ${xp}</h3>

<h3>🪙 Coins : ${coins}</h3>

<button onclick="location.reload()">

🔄 Play Again

</button>

`;

return;

}

loadQuestion();

}

loadQuestion();

</script>

</body>
</html>
