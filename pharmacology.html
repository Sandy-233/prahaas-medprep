<!DOCTYPE html>
<html>
<head>
<title>Pharmacology</title>
<style>
body{
background:#0b0f17;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}
button{
padding:15px 30px;
font-size:20px;
background:#00ff99;
border:none;
border-radius:12px;
font-weight:bold;
}
a{

<body>

<h1>💊 Pharmacology</h1>

<h2>Welcome to Pharmacology</h2>

<h2>General Pharmacology</h2>

<input type="checkbox"> ANS<br><br>

<input type="checkbox"> CVS Drugs<br><br>

<input type="checkbox"> Antibiotics<br><br>

<input type="checkbox"> CNS Drugs<br><br>

<input type="checkbox"> Endocrine Drugs<br><br>
<br>

<button>
<a href="dashboard.html">⬅ Back to Dashboard</a>
</button>
<script>
const boxes = document.querySelectorAll("input[type='checkbox']");

boxes.forEach((box, index) => {
    box.checked = localStorage.getItem("pharma" + index) === "true";

    box.addEventListener("change", () => {
        localStorage.setItem("pharma" + index, box.checked);
    });
});
</script>
</body>
</html>
