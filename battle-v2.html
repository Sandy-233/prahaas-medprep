<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BattleMed Multiplayer</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#07131d;

color:white;

overflow-x:hidden;

}

header{

background:#122231;

padding:18px;

display:flex;

justify-content:space-between;

align-items:center;

box-shadow:0 0 15px rgba(0,255,170,.15);

}

.logo{

font-size:30px;

font-weight:bold;

color:#00ff99;

}

.topBar{

display:flex;

gap:20px;

align-items:center;

}

.badge{

background:#1f3549;

padding:10px 18px;

border-radius:12px;

}

.container{

width:95%;

max-width:1300px;

margin:auto;

padding:25px;

}

.battleCard{

background:#122231;

padding:25px;

border-radius:20px;

box-shadow:0 0 20px rgba(0,255,170,.15);

}

.status{

display:flex;

justify-content:space-between;

margin-top:15px;

flex-wrap:wrap;

gap:15px;

}

.player{

flex:1;

background:#1d3347;

padding:20px;

border-radius:15px;

text-align:center;

}

.player img{

width:90px;

height:90px;

border-radius:50%;

border:3px solid #00ff99;

}

.player h2{

margin-top:15px;

}

.healthBar{

width:100%;

height:18px;

background:#333;

border-radius:15px;

margin-top:15px;

overflow:hidden;

}

.health{

height:100%;

width:100%;

background:#00ff99;

transition:.4s;

}

.middle{

margin-top:30px;

display:grid;

grid-template-columns:1fr 220px 1fr;

gap:20px;

}

.questionCard{

background:#1d3347;

padding:25px;

border-radius:20px;

}

.timer{

font-size:55px;

text-align:center;

color:#00ff99;

margin-top:10px;

}

.scoreBoard{

background:#122231;

border-radius:20px;

padding:20px;

text-align:center;

}

.scoreBoard h2{

margin-bottom:15px;

}

.question{

font-size:28px;

line-height:1.5;

margin-bottom:25px;

}

.option{

width:100%;

padding:18px;

margin-top:12px;

font-size:18px;

background:#20384f;

border:none;

border-radius:12px;

color:white;

cursor:pointer;

transition:.25s;

}

.option:hover{

background:#00ff99;

color:black;

}

.footer{

margin-top:30px;

display:flex;

justify-content:center;

gap:20px;

}

.footer button{

padding:15px 35px;

font-size:18px;

border:none;

border-radius:12px;

cursor:pointer;

}

.exit{

background:#ff4444;

color:white;

}

.next{

background:#00ff99;

}

.hidden{

display:none;

}

@media(max-width:900px){

.middle{

grid-template-columns:1fr;

}

.status{

flex-direction:column;

}

}

</style>

</head>

<body>

<header>

<div class="logo">

🏥 BattleMed

</div>

<div class="topBar">

<div class="badge">

⭐ XP :
<span id="xp">0</span>

</div>

<div class="badge">

🪙 Coins :
<span id="coins">0</span>

</div>

<div class="badge">

🔥 Room :
<span id="roomId">------</span>

</div>

</div>

</header>

<div class="container">

<div class="battleCard">

<div class="status">

<div class="player">

<img id="myPhoto">

<h2 id="myName">

Loading...

</h2>

<div class="healthBar">

<div id="myHealth" class="health">

</div>

</div>

</div>

<div class="player">

<img id="enemyPhoto">

<h2 id="enemyName">

Waiting...

</h2>

<div class="healthBar">

<div id="enemyHealth" class="health">

</div>

</div>

</div>

</div>
