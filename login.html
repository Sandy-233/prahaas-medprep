<!DOCTYPE html>
<html>
<head>

<title>Login  - BattleMed</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#071018,#061d16,#000);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{

width:340px;

background:rgba(255,255,255,.08);

padding:30px;

border-radius:20px;

text-align:center;

backdrop-filter:blur(15px);

color:white;

}

h1{

color:#00ffb3;

}

input{

width:90%;

padding:15px;

margin:12px;

border:none;

border-radius:10px;

font-size:16px;

}

button{

width:90%;

padding:15px;

margin-top:20px;

border:none;

border-radius:12px;

background:#00ff99;

font-size:18px;

font-weight:bold;

cursor:pointer;

}

a{

color:#00ff99;

text-decoration:none;

}

</style>

</head>

<body>

<div class="box">

<h1>🏥 BattleMed</h1>

<h2>Login</h2>
<button id="googleLogin">
🔐 Sign in with Google
</button>

<br><br>

<a href="index.html">⬅ Back to Home</a>

</div>
    <script type="module">
import { auth, provider, signInWithPopup } from "./firebase.js";

document.getElementById("googleLogin").addEventListener("click", async () => {
  try {
    await signInWithPopup(auth, provider);
   const result = await signInWithPopup(auth, provider);
console.log(result.user);
window.location.href = "dashboard.html";
  } catch (e) {
    alert(e.message);
  }
});
</script>

</body>
</html>
